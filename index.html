<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garda Futsal - Sistem Americano</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Tambahan SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { neon: '#39ff14', dark: '#121212' } } } }
    </script>
</head>
<body class="bg-dark text-white min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-md w-full bg-gray-900 rounded-xl shadow-2xl p-8 border border-gray-800 relative">
        <h1 class="text-3xl font-black text-center mb-2 italic tracking-wider">GARDA<span class="text-neon">FUTSAL</span></h1>
        <p class="text-gray-400 text-center mb-8 text-sm">Sistem Klasemen Americano</p>

        <div class="mb-8 p-4 bg-gray-800 rounded-lg border border-gray-700">
            <h2 class="text-lg font-bold mb-3 text-neon">PEMAIN</h2>
            <input type="text" id="roomCodeInput" placeholder="Masukkan Kode Room (Msl: GARDA01)" 
                   class="w-full p-3 rounded bg-gray-900 border border-gray-700 text-white focus:border-neon focus:outline-none mb-3 uppercase text-center font-bold tracking-widest">
            <button onclick="joinRoom()" class="w-full bg-neon text-black font-bold py-3 rounded hover:bg-green-400 transition shadow-[0_0_10px_rgba(57,255,20,0.3)]">
                MASUK KE LIVE SCORE
            </button>
        </div>

        <div class="p-4 bg-gray-800 rounded-lg border border-gray-700">
            <h2 class="text-lg font-bold mb-3 text-blue-400">ADMIN / PANITIA</h2>
            <input type="number" id="durationInput" placeholder="Durasi Sewa (Menit)" value="120"
                   class="w-full p-3 rounded bg-gray-900 border border-gray-700 text-white focus:border-blue-400 focus:outline-none mb-3 text-center font-bold">
            <button onclick="createRoom()" class="w-full bg-blue-600 text-white font-bold py-3 rounded hover:bg-blue-500 transition shadow-[0_0_10px_rgba(37,99,235,0.3)]">
                BUAT ROOM BARU
            </button>
        </div>
    </div>

    <!-- Tombol Reset Data Lokal -->
    <button onclick="resetData()" class="mt-6 text-sm text-gray-500 underline hover:text-red-400 transition">
        &circlearrowright; Reset Data Lokal (Cache)
    </button>

    <script>
        const supabaseUrl = 'https://assaxxfdxtycdqkkkgpc.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFzc2F4eGZkeHR5Y2Rxa2trZ3BjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMjk4MDQsImV4cCI6MjA5MjYwNTgwNH0.5L3XfA3GOQqIzzNGOBZRTSINqGugDp1sj07BBYpsqEc';
        const db = supabase.createClient(supabaseUrl, supabaseKey);

        // Kustomisasi Tema SweetAlert agar Sporty
        const swalDark = Swal.mixin({
            background: '#1f2937', color: '#fff',
            confirmButtonColor: '#39ff14', cancelButtonColor: '#ef4444',
            customClass: { confirmButton: 'text-black font-bold px-6 py-2 rounded', cancelButton: 'font-bold px-6 py-2 rounded' }
        });

        async function joinRoom() {
            const code = document.getElementById('roomCodeInput').value.trim().toUpperCase();
            if (!code) return swalDark.fire('Oops!', 'Masukkan kode room terlebih dahulu!', 'warning');

            const { data, error } = await db.from('garda_rooms').select('id').eq('room_code', code).single();

            if (error || !data) {
                swalDark.fire('Tidak Ditemukan', 'Kode Room tidak valid atau sesi telah berakhir.', 'error');
            } else {
                localStorage.setItem('garda_room_code', code);
                swalDark.fire({ title: 'Berhasil!', text: 'Mengarahkan ke Live Score...', icon: 'success', timer: 1500, showConfirmButton: false })
                .then(() => { window.location.href = `room.html?id=${code}`; });
            }
        }

        function createRoom() {
            const duration = document.getElementById('durationInput').value;
            if (!duration || duration < 30) return swalDark.fire('Durasi Terlalu Singkat', 'Durasi sewa minimal adalah 30 menit.', 'warning');

            // KONFIRMASI KEPUTUSAN
            swalDark.fire({
                title: 'Buat Room?',
                text: `Sesi futsal akan berjalan selama ${duration} menit.`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'Ya, Buat Room!',
                cancelButtonText: 'Batal'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    swalDark.fire({ title: 'Membuat Room...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
                    
                    const randomCode = 'GARDA' + Math.floor(100 + Math.random() * 900);
                    const { data, error } = await db.from('garda_rooms').insert([{ room_code: randomCode, total_duration: parseInt(duration), status: 'waiting' }]).select().single();

                    if (error) {
                        swalDark.fire('Gagal!', 'Terjadi kesalahan sistem.', 'error');
                    } else {
                        localStorage.setItem('garda_admin_room', randomCode);
                        swalDark.fire({ title: 'Room Tercipta!', html: `Kode Anda: <b class="text-neon text-2xl">${randomCode}</b>`, icon: 'success', confirmButtonText: 'Masuk ke Panel' })
                        .then(() => { window.location.href = `admin.html?id=${randomCode}`; });
                    }
                }
            });
        }

        function resetData() {
            swalDark.fire({
                title: 'Reset Data Aplikasi?',
                text: "Riwayat login (Kode Room) yang tersimpan di HP ini akan dihapus.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444', cancelButtonColor: '#4b5563',
                confirmButtonText: 'Ya, Bersihkan!', cancelButtonText: 'Batal'
            }).then((result) => {
                if (result.isConfirmed) {
                    localStorage.clear();
                    swalDark.fire('Bersih!', 'Data lokal telah direset.', 'success');
                }
            });
        }
    </script>
</body>
</html>
